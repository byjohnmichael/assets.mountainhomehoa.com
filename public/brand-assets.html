<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brand Assets — MHHOA</title>
  <link rel="icon" href="favicon.png" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --navy:  #1e3a6e;
      --blue:  #5b9bd5;
      --light: #e8f0fb;
      --gray:  #6b7280;
      --bg:    #f5f7fa;
      --white: #ffffff;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--navy);
      min-height: 100vh;
    }

    header {
      background: var(--white);
      border-bottom: 3px solid var(--blue);
      padding: 16px 32px;
      display: flex;
      align-items: center;
      gap: 16px;
      box-shadow: 0 2px 8px rgba(30,58,110,0.08);
    }

    header img { height: 48px; }

    .header-text h1 {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--navy);
    }

    .header-text p {
      font-size: 0.75rem;
      color: var(--gray);
      margin-top: 1px;
    }

    header .back {
      margin-left: auto;
      font-size: 0.82rem;
      color: var(--blue);
      text-decoration: none;
      font-weight: 600;
    }

    header .back:hover { text-decoration: underline; }

    .page {
      max-width: 900px;
      margin: 0 auto;
      padding: 48px 24px;
    }

    .section-label {
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--gray);
      margin-bottom: 20px;
    }

    .assets-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 20px;
    }

    .asset-card {
      background: var(--white);
      border: 1px solid #dce4f0;
      border-radius: 12px;
      overflow: hidden;
    }

    .asset-preview {
      background: #f0f4fb;
      padding: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 160px;
      border-bottom: 1px solid #dce4f0;
    }

    .asset-preview img {
      max-width: 100%;
      max-height: 120px;
      object-fit: contain;
    }

    .asset-preview.icon-preview img {
      max-height: 64px;
    }

    .asset-info {
      padding: 20px;
    }

    .asset-info h3 {
      font-size: 0.95rem;
      font-weight: 700;
      color: var(--navy);
      margin-bottom: 4px;
    }

    .asset-path {
      font-family: 'Menlo', 'Monaco', monospace;
      font-size: 0.7rem;
      color: var(--gray);
      background: #f0f4fb;
      padding: 4px 8px;
      border-radius: 4px;
      margin: 8px 0 14px;
      word-break: break-all;
    }

    .asset-actions {
      display: flex;
      gap: 8px;
    }

    .btn-download {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--navy);
      color: white;
      text-decoration: none;
      border-radius: 7px;
      padding: 7px 14px;
      font-size: 0.8rem;
      font-weight: 600;
      transition: background 0.15s;
    }

    .btn-download:hover { background: #16305c; }

    .btn-download svg { width: 13px; height: 13px; fill: white; }

    .btn-copy {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: var(--light);
      color: var(--navy);
      border: none;
      border-radius: 7px;
      padding: 7px 14px;
      font-size: 0.8rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    .btn-copy:hover { background: #d4e4f7; }
    .btn-copy.copied { background: #dcfce7; color: #16a34a; }

    .btn-copy svg { width: 13px; height: 13px; fill: currentColor; }

    footer {
      text-align: center;
      padding: 32px 24px;
      font-size: 0.8rem;
      color: var(--gray);
      border-top: 1px solid #dce4f0;
      margin-top: 48px;
    }
  </style>
</head>
<body>

  <header>
    <img src="logo-master.png" alt="Mountain Home HOA Solutions" />
    <div class="header-text">
      <h1>Brand Assets</h1>
      <p>Mountain Home HOA Solutions</p>
    </div>
    <a href="index.html" class="back">← Assets Portal</a>
  </header>

  <div class="page">
    <p class="section-label">Available Assets</p>

    <div class="assets-grid">

      <div class="asset-card">
        <div class="asset-preview">
          <img src="logo-master.png" alt="Master Logo" />
        </div>
        <div class="asset-info">
          <h3>Master Logo</h3>
          <div class="asset-path">https://assets.mountainhomehoa.com/logo-master.png</div>
          <div class="asset-actions">
            <a href="logo-master.png" download class="btn-download">
              <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zm-8 2V5h2v6h1.17L12 13.17 9.83 11H11zm-6 7h14v2H5z"/></svg>
              Download
            </a>
            <button class="btn-copy" onclick="copyURL(this, 'https://assets.mountainhomehoa.com/logo-master.png')">
              <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
              Copy URL
            </button>
          </div>
        </div>
      </div>

      <div class="asset-card">
        <div class="asset-preview icon-preview">
          <img src="favicon.png" alt="Favicon / Icon" />
        </div>
        <div class="asset-info">
          <h3>Favicon / Icon</h3>
          <div class="asset-path">https://assets.mountainhomehoa.com/favicon.png</div>
          <div class="asset-actions">
            <a href="favicon.png" download class="btn-download">
              <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zm-8 2V5h2v6h1.17L12 13.17 9.83 11H11zm-6 7h14v2H5z"/></svg>
              Download
            </a>
            <button class="btn-copy" onclick="copyURL(this, 'https://assets.mountainhomehoa.com/favicon.png')">
              <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
              Copy URL
            </button>
          </div>
        </div>
      </div>

    </div>
  </div>

  <footer>
    &copy; 2026 Mountain Home HOA Solutions
  </footer>

  <script>
    function copyURL(btn, url) {
      navigator.clipboard.writeText(url).then(() => {
        btn.textContent = '✓ Copied!';
        btn.classList.add('copied');
        setTimeout(() => {
          btn.innerHTML = `<svg viewBox="0 0 24 24" style="width:13px;height:13px;fill:currentColor"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg> Copy URL`;
          btn.classList.remove('copied');
        }, 2000);
      });
    }
  </script>

</body>
</html>
